<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>@cmx-geral/ui — Documentação</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Design system da CMX — playbook, plano e adoção do pacote @cmx-geral/ui" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      :root { --theme-color: #2540ff; }
      .markdown-section { max-width: 880px; }
      .markdown-section table { display: table; width: 100%; }
    </style>
  </head>
  <body>
    <div id="app">Carregando…</div>
    <script>
      window.$docsify = {
        name: '@cmx-geral/ui',
        loadSidebar: true,
        subMaxLevel: 2,
        homepage: 'README.md',
        auto2top: true,
        search: {
          placeholder: 'Buscar…',
          noData: 'Sem resultados.',
          depth: 3,
        },
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-jsx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-tsx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
  </body>
</html>
